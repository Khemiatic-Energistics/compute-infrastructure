# Deployment for the Docking Job Controller
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docking-controller
  namespace: default
  labels:
    app: docking-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docking-controller
  template:
    metadata:
      labels:
        app: docking-controller
    spec:
      serviceAccountName: docking-controller
      containers:
        - name: controller
          image: docking-controller:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: NAMESPACE
              value: "default"
            - name: KUBECONFIG
              value: "/etc/kubernetes/admin.conf"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: kubeconfig
              mountPath: /etc/kubernetes
              readOnly: true
      volumes:
        - name: kubeconfig
          secret:
            secretName: kubernetes-admin
---
# Service for the Docking Job Controller
apiVersion: v1
kind: Service
metadata:
  name: docking-controller
  namespace: default
  labels:
    app: docking-controller
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: docking-controller
---
# Service with LoadBalancer for external access
apiVersion: v1
kind: Service
metadata:
  name: docking-controller-lb
  namespace: default
  labels:
    app: docking-controller
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: docking-controller
